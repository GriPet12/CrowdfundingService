server:
  port: 8081
  servlet:
    context-path: /api

spring:
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:your-email@gmail.com}
    password: ${MAIL_APP_PASSWORD:your-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  application:
    name: CrowdfundingService
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/croundfunding?TimeZone=UTC}
    username: ${DB_USERNAME:user}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate.jdbc.time_zone: UTC
    show-sql: false
  h2:
    console:
      enabled: false
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:change-me}
            client-secret: ${GOOGLE_CLIENT_SECRET:change-me}
            scope: email, profile
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
          # facebook:
          #   client-id: YOUR_FACEBOOK_APP_ID
          #   client-secret: YOUR_FACEBOOK_APP_SECRET
          #   scope: email, public_profile
          #   redirect-uri: "{baseUrl}/api/login/oauth2/code/{registrationId}"

jwt:
  secret: ${JWT_SECRET:verySecretKeyThatShouldBeAtLeast256BitsLongForHS256Algorithm}
  expirationMs: 86400000

frontend:
  url: ${FRONTEND_URL:http://localhost:5173}

# Default admin account (created automatically on first startup if no admin exists)
admin:
  username: ${ADMIN_USERNAME:admin}
  password: ${ADMIN_PASSWORD:admin123}
  email: ${ADMIN_EMAIL:admin@crowdfunding.local}

stripe:
  secret-key: ${STRIPE_SECRET_KEY:sk_test_changeme}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:whsec_changeme}
  return-url: ${STRIPE_RETURN_URL:http://localhost:5173}

